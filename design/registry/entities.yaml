# ─── CONSTANTS ───────────────────────────────────────────────────────────────
# Named numerical values referenced across multiple systems.
# Register a constant when it is defined in one GDD but another GDD must
# agree with it (e.g., gold carry limit defined in economy but checked in
# inventory, or base inventory slots defined in inventory but displayed in HUD).
#
# Required fields: name, status, source, referenced_by, value, unit, added

constants:
  - name: room_size_classes
    status: active
    source: design/gdd/level-map-generation.md
    referenced_by:
      - design/gdd/level-map-generation.md
    value: "Small<=25; Medium<=80; Large>80"
    unit: sqm
    notes: "Exactly three classes (legacy 'Hall' dropped). Loot/Content Fill and Mission must use
      only these three. Slot size + content-fill density key off this."
    added: 2026-06-08
    revised: ""
  - name: f1_stair_anchors
    status: active
    source: design/gdd/level-map-generation.md
    referenced_by:
      - design/gdd/level-map-generation.md
    value: "STAIRA1=(26,28,4x8); STAIRB1=(0,16,4x8)"
    unit: metres (x,z,w,d)
    notes: "F1 stair cores are LOCKED. Each floor's stair landings must align directly above the floor
      below (F2 STAIRA2@(26,28), STAIRB2@(0,16)) so descents physically connect. Generator never moves
      descents. F1 itself is locked in the Unity scene and must not be regenerated."
    added: 2026-06-08
    revised: ""
  - name: company_start_state
    status: active
    source: design/gdd/office-economy-progression.md
    referenced_by:
      - design/gdd/office-economy-progression.md
      - docs/mvp-core-loop.md   # describes the same opening (to be superseded by this GDD)
    value: "Funds=-300; Debt=300; Reputation=0; OfficeLevel=1; Experience=0"
    unit: game state (G / int)
    notes: "Fresh company opening (CompanyData.NewState). Two clean full jobs (+600G) clear the
      opening deficit and afford the 150G tutorial acquisition. Debt is a static backdrop (does not
      drain funds)."
    added: 2026-06-09
    revised: ""
  - name: full_job_reward
    status: active
    source: design/gdd/office-economy-progression.md
    referenced_by:
      - design/gdd/office-economy-progression.md
      - design/gdd/mission-state-machine.md   # "a clean full job ≈ 300G"
    value: "300"
    unit: G (money); also +5 reputation, +80 experience
    notes: "FullSuccess base reward. Partial=60G/+0/+15, Failure=20G/-2/0, Bonus evidence=+90G/+1/+20
      (additive). Magnitudes owned here; Mission emits only the outcome+payload."
    added: 2026-06-09
    revised: ""
  - name: tutorial_acquisition_cost
    status: active
    source: design/gdd/office-economy-progression.md
    referenced_by:
      - design/gdd/office-economy-progression.md
      - docs/mvp-core-loop.md
    value: "150"
    unit: G
    notes: "= TutorialOfficeValuation(100) * 3/2. MVP license stand-in (stage 1->2). Gated by
      OfficeLevel==1, CompletedLostItemJobs>=2, HasAcquiredTutorialOffice==false, Funds>=150,
      HostileTakeoverPressure<70. On accept: OfficeLevel->2, Pressure-=20."
    added: 2026-06-09
    revised: ""

