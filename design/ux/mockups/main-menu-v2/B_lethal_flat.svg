<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#222B22"/>
      <stop offset="1" stop-color="#181F18"/>
    </linearGradient>
  </defs>

  <!-- 背景：LC 系暗橄榄绿，不是纯黑；带极淡扫描线 -->
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <g opacity="0.10" stroke="#000000" stroke-width="2">
    <line x1="0" y1="60" x2="1920" y2="60"/><line x1="0" y1="120" x2="1920" y2="120"/>
    <line x1="0" y1="180" x2="1920" y2="180"/><line x1="0" y1="240" x2="1920" y2="240"/>
    <line x1="0" y1="300" x2="1920" y2="300"/><line x1="0" y1="360" x2="1920" y2="360"/>
    <line x1="0" y1="420" x2="1920" y2="420"/><line x1="0" y1="480" x2="1920" y2="480"/>
    <line x1="0" y1="540" x2="1920" y2="540"/><line x1="0" y1="600" x2="1920" y2="600"/>
    <line x1="0" y1="660" x2="1920" y2="660"/><line x1="0" y1="720" x2="1920" y2="720"/>
    <line x1="0" y1="780" x2="1920" y2="780"/><line x1="0" y1="840" x2="1920" y2="840"/>
    <line x1="0" y1="900" x2="1920" y2="900"/><line x1="0" y1="960" x2="1920" y2="960"/>
    <line x1="0" y1="1020" x2="1920" y2="1020"/>
  </g>

  <!-- 标题：朴素黑体，不撑满，琥珀下划线 -->
  <text x="120" y="240" font-family="Microsoft YaHei" font-size="96" font-weight="bold"
        fill="#D8D2BC" letter-spacing="10">黑色委托</text>
  <rect x="124" y="268" width="430" height="6" fill="#C78A33"/>
  <text x="124" y="318" font-family="Consolas,Microsoft YaHei" font-size="24"
        fill="#8B9484" letter-spacing="10">BLACK COMMISSION · 外包黑色委托事务所</text>

  <!-- 菜单列：纯文字行 + 琥珀箭头 hover（首行示意），行间细分隔线 -->
  <g font-family="Microsoft YaHei">
    <text x="120" y="468" font-size="40" font-weight="bold" fill="#E8B25C" letter-spacing="4">▸ 继续营业</text>
    <line x1="120" y1="496" x2="640" y2="496" stroke="#3A453A" stroke-width="2"/>

    <text x="156" y="566" font-size="36" fill="#BFC4AE" letter-spacing="4">新事务所</text>
    <line x1="120" y1="594" x2="640" y2="594" stroke="#3A453A" stroke-width="2"/>

    <text x="156" y="664" font-size="36" fill="#BFC4AE" letter-spacing="4">加入事务所</text>
    <line x1="120" y1="692" x2="640" y2="692" stroke="#3A453A" stroke-width="2"/>

    <text x="156" y="762" font-size="36" fill="#BFC4AE" letter-spacing="4">设置</text>
    <line x1="120" y1="790" x2="640" y2="790" stroke="#3A453A" stroke-width="2"/>

    <text x="156" y="860" font-size="36" fill="#BFC4AE" letter-spacing="4">关机</text>
    <line x1="120" y1="888" x2="640" y2="888" stroke="#3A453A" stroke-width="2"/>
  </g>

  <!-- hover 行的说明字（仅选中行显示，减少噪音） -->
  <text x="660" y="468" font-family="Microsoft YaHei" font-size="20" fill="#7E8872">继续上一份账本</text>

  <!-- 右下：低饱和事务所剪影插画位（面包车+卷帘门，示意块面） -->
  <g opacity="0.5">
    <rect x="1310" y="700" width="430" height="240" fill="#1E261E"/>
    <rect x="1340" y="800" width="240" height="110" rx="10" fill="#2E3A33"/>
    <rect x="1352" y="772" width="170" height="56" rx="8" fill="#2E3A33"/>
    <circle cx="1395" cy="918" r="26" fill="#141A14"/>
    <circle cx="1530" cy="918" r="26" fill="#141A14"/>
    <rect x="1620" y="730" width="100" height="180" fill="#242E26"/>
    <line x1="1620" y1="760" x2="1720" y2="760" stroke="#1A221C" stroke-width="6"/>
    <line x1="1620" y1="790" x2="1720" y2="790" stroke="#1A221C" stroke-width="6"/>
    <line x1="1620" y1="820" x2="1720" y2="820" stroke="#1A221C" stroke-width="6"/>
    <line x1="1620" y1="850" x2="1720" y2="850" stroke="#1A221C" stroke-width="6"/>
  </g>

  <!-- 底部：版本 + 直连 + 一句债务 flavor -->
  <text x="120" y="1016" font-family="Consolas" font-size="18" fill="#6E7A66">ver 0.1</text>
  <text x="220" y="1016" font-family="Microsoft YaHei" font-size="18" fill="#6E7A66">局域网直连…</text>
  <text x="1800" y="1016" font-family="Microsoft YaHei" font-size="18" fill="#9A5A4A" text-anchor="end">本季度欠款：1,200G</text>
</svg>
