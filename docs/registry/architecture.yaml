#       - docs/architecture/adr-0002-physics-architecture.md
#       - docs/architecture/adr-0003-combat-system.md
#     added: 2026-03-26
#     revised: ""


# ─── FORBIDDEN PATTERNS ──────────────────────────────────────────────────────
# Architecture anti-patterns explicitly banned by accepted ADRs.
# When writing a new ADR, check this list — if the proposed approach matches
# a forbidden pattern, it must be reworked before the ADR can be Accepted.
#
# Register a pattern when an ADR explicitly bans it AND other ADRs might
# unknowingly use it (i.e., it's a tempting but wrong approach for this project).

forbidden_patterns:
  - pattern: client_authoritative_state_write
    status: active
    description: "A client must never write a NetworkVariable or decide authoritative
      gameplay outcomes (mission completion, partial return, failure, rewards) locally.
      Route every change through a ServerRpc that the host validates behind an
      IsServer/IsHost guard."
    why: "Client-side authority is trivially cheatable and causes desync. The host is
      the single source of truth for all shared state (ADR-0001)."
    adr: docs/architecture/ADR-0001-host-authoritative-networking.md
    added: 2026-06-07
  - pattern: player_cap_above_four
    status: active
    description: "Sessions must never exceed 4 players (host + 3). This is a permanent
      design ceiling, not an MVP placeholder. NOTE: the cap is currently duplicated in
      ConnectionManager.MaxConnections (3) and MvpConnectionLimiter.maxPlayers (4) —
      keep them consistent; preferably derive both from one shared constant."
    why: "Confirmed permanent hard limit by PM; the duplication is a tracked tech-debt
      risk that can silently desync the two values."
    adr: docs/architecture/ADR-0002-relay-transport-connection-approval.md
    added: 2026-06-07
  - pattern: custom_backend
    status: active
    description: "No custom backend server. Stay in Unity + Netcode for GameObjects
      with host-authored state. Steam/Relay are transport/services only."
    why: "Explicit project rule (@AGENTS.md, technical-preferences). Over-scopes a
      1–4 player co-op MVP."
    adr: docs/architecture/ADR-0001-host-authoritative-networking.md
    added: 2026-06-07

