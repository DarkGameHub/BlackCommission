# ─── API DECISIONS ───────────────────────────────────────────────────────────
# Which engine APIs are chosen for which purpose across the project.
# Conflicts: two ADRs using different APIs for the same purpose = inconsistent
# implementation that breaks when one system expects the other's API.
#
# Register an API decision when the choice is non-obvious and other ADRs might
# make a different choice for the same purpose without knowing this was decided.

api_decisions:
  - purpose: multiplayer_transport
    status: active
    api: "Unity Relay (DTLS) + UnityTransport, anonymous AuthenticationService, join-code matchmaking"
    not: "Direct IP/port-forwarding (dev/LAN-test only); Steam transport (deferred to future ADR)"
    adr: docs/architecture/ADR-0002-relay-transport-connection-approval.md
    reason: "Internet co-op with NAT traversal and encryption, no custom backend (per @AGENTS.md)."
    referenced_by:
      - docs/architecture/ADR-0002-relay-transport-connection-approval.md
    added: 2026-06-07
    revised: ""
  - purpose: connection_approval
    status: active
    api: "NetworkManager.ConnectionApprovalCallback — version gate (GameBuild.Version) + 4-player cap"
    not: "Open/unapproved connections"
    adr: docs/architecture/ADR-0002-relay-transport-connection-approval.md
    reason: "Reject build-version mismatches and enforce the permanent 4-player hard cap server-side."
    referenced_by:
      - docs/architecture/ADR-0002-relay-transport-connection-approval.md
    added: 2026-06-07
    revised: ""

# Example:
#
# api_decisions:
